<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Loop | Institutional Resource Exchange</title>
    <!-- Tailwind CSS for modern utility-first styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Plus Jakarta Sans for a premium, aesthetic typography -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .v-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .v-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 50px -12px rgba(79, 70, 229, 0.15);
        }

        #listingModal {
            display: none;
        }
        #listingModal.active {
            display: flex;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- 1. NAVIGATION INTERFACE -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-200 px-6 py-4 flex flex-col md:flex-row justify-between items-center sticky top-0 z-50 gap-4">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center text-white font-bold shadow-lg shadow-indigo-100">V</div>
            <span class="text-2xl font-black tracking-tighter italic">V-Loop</span>
        </div>

        <div class="relative w-full md:w-96">
            <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Query laboratory apparatus, scholarly publications..." 
                   class="w-full pl-11 pr-4 py-3 bg-slate-100 border-none rounded-2xl text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
            <div class="absolute left-4 top-3 text-slate-400">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            </div>
        </div>

        <div class="flex gap-4 items-center">
            <button onclick="toggleModal()" class="bg-indigo-600 text-white px-6 py-2.5 rounded-2xl text-sm font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all">
                + Register Asset
            </button>
            <div class="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center text-slate-500 hover:bg-slate-200 transition-colors cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
        </div>
    </nav>

    <!-- 2. HERO COMPONENT -->
    <header class="max-w-4xl mx-auto px-6 py-12 text-center">
        <h1 class="text-4xl md:text-5xl font-black mb-4 tracking-tight">Vidya Loop.</h1>
        <p class="text-slate-500 text-lg font-medium"> </p>Buy, sell, or rent items from your college peers. Safe, simple, and Trustable.</p>
    </header>

    <!-- 3. ASSET INVENTORY GRID -->
    <main class="max-w-7xl mx-auto px-6 pb-20">
        <div class="flex gap-3 overflow-x-auto no-scrollbar mb-10 pb-2">
            <button onclick="filterCategory('All')" class="category-btn px-6 py-2 bg-indigo-600 text-white rounded-xl text-xs font-black uppercase tracking-widest shadow-md">Comprehensive</button>
            <button onclick="filterCategory('Tools')" class="category-btn px-6 py-2 bg-white border border-slate-200 text-slate-400 rounded-xl text-xs font-black uppercase tracking-widest hover:border-indigo-500 hover:text-indigo-600 transition-all">Technical Implements</button>
            <button onclick="filterCategory('Lab Gear')" class="category-btn px-6 py-2 bg-white border border-slate-200 text-slate-400 rounded-xl text-xs font-black uppercase tracking-widest hover:border-indigo-500 hover:text-indigo-600 transition-all">Laboratory Apparatus</button>
            <button onclick="filterCategory('Textbook')" class="category-btn px-6 py-2 bg-white border border-slate-200 text-slate-400 rounded-xl text-xs font-black uppercase tracking-widest hover:border-indigo-500 hover:text-indigo-600 transition-all">Scholarly Publications</button>
        </div>

        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>

        <div id="noResults" class="hidden text-center py-20">
            <p class="text-slate-400 font-bold italic">No assets corresponding to the specified parameters were identified.</p>
        </div>
    </main>

    <!-- 4. MODAL: ASSET REGISTRATION -->
    <div id="listingModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden p-8 relative">
            <button onclick="toggleModal()" class="absolute top-6 right-6 text-slate-400 hover:text-slate-600">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            </button>
            <h2 class="text-2xl font-black mb-1 italic text-slate-800">Asset Submission Portal</h2>
            <p class="text-slate-400 text-sm mb-8 font-medium">Authenticated institutional resource allocation.</p>
            <form class="space-y-4" onsubmit="handleNewListing(event)">
                <input type="text" id="itemName" required placeholder="Nomenclature of Asset" class="w-full bg-slate-100 border-none rounded-2xl px-5 py-4 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="itemPrice" required placeholder="Valuation (INR)" class="w-full bg-slate-100 border-none rounded-2xl px-5 py-4 text-sm outline-none">
                    <select id="itemCategory" class="w-full bg-slate-100 border-none rounded-2xl px-5 py-4 text-sm outline-none appearance-none">
                        <option value="Tools">Tools</option>
                        <option value="Lab Gear">Lab Gear</option>
                        <option value="Textbook">Textbook</option>
                    </select>
                </div>
                <input type="text" id="itemImage" placeholder="Digital Resource Locator (URL)" class="w-full bg-slate-100 border-none rounded-2xl px-5 py-4 text-sm outline-none">
                <button type="submit" class="w-full bg-indigo-600 text-white py-5 rounded-[2rem] font-black uppercase text-xs tracking-widest shadow-xl hover:bg-indigo-700 transition-all mt-4">
                    Finalize Asset Entry
                </button>
            </form>
        </div>
    </div>

    <!-- 6. APPLICATION LOGIC -->
    <script>
        const DEFAULT_ASSETS = [
            { id: 1, title: "Engineering Drawing Kit", price: 450, category: "Tools", type: "Sell", image: "https://i0.wp.com/www.shopatprince.com/wp-content/uploads/2020/01/20200004.jpg?fit=512%2C512&ssl=1" },
            { id: 2, title: "Professional Lab Coat", price: 150, category: "Lab Gear", type: "Rent", unit: "/Day", image: "https://images.unsplash.com/photo-1581093588401-fbb62a02f120?auto=format&fit=crop&q=80&w=400" },
            { id: 3, title: "S1 Textbooks", price: 150, category: "Textbook", type: "Rent", unit: "/Day", image: "https://preview.redd.it/s4wfed4t5ga21.jpg?width=1080&crop=smart&auto=webp&s=dac789f8e4a75a803fb98c69a451a847d250cbe1" }
        ];

        // PERSISTENCE LOGIC: Load from LocalStorage or use defaults
        let products = JSON.parse(localStorage.getItem('vloop_assets')) || DEFAULT_ASSETS;
        let currentSearch = "";
        let currentCategory = "All";

        function syncStorage() {
            localStorage.setItem('vloop_assets', JSON.stringify(products));
        }

        window.onload = renderProducts;

        function renderProducts() {
            const grid = document.getElementById('productGrid');
            const noResults = document.getElementById('noResults');
            
            const filtered = products.filter(p => {
                const matchesSearch = p.title.toLowerCase().includes(currentSearch.toLowerCase());
                const matchesCategory = currentCategory === "All" || p.category === currentCategory;
                return matchesSearch && matchesCategory;
            });

            grid.innerHTML = "";
            noResults.classList.toggle('hidden', filtered.length > 0);

            filtered.forEach(p => {
                grid.innerHTML += `
                    <div class="v-card bg-white rounded-[2.5rem] border border-slate-100 overflow-hidden shadow-sm p-4">
                        <img src="${p.image}" class="w-full h-52 object-cover rounded-[1.75rem] mb-4" onerror="this.src='https://images.unsplash.com/photo-1586075010923-2dd4570fb338?w=400'">
                        <div class="px-2">
                            <span class="text-[10px] font-bold ${p.category === 'Tools' ? 'text-indigo-600' : 'text-blue-500'} uppercase tracking-widest">${p.category}</span>
                            <h3 class="font-bold text-lg mt-1 text-slate-800">${p.title}</h3>
                            <div class="flex justify-between items-center mt-5">
                                <span class="text-2xl font-black text-slate-900">₹${p.price} ${p.unit ? `<small class="text-slate-400 font-normal text-xs">${p.unit}</small>` : ''}</span>
                                <button class="${p.type === 'Sell' ? 'bg-slate-900' : 'bg-blue-500'} text-white px-5 py-2.5 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:opacity-80 transition-opacity">
                                    ${p.type === 'Sell' ? 'Examine Details' : 'Lease Asset'}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function toggleModal() {
            document.getElementById('listingModal').classList.toggle('active');
        }

        function handleSearch() {
            currentSearch = document.getElementById('searchInput').value;
            renderProducts();
        }

        function filterCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.category-btn').forEach(btn => {
                const label = btn.innerText.toUpperCase();
                const isSelected = label === cat.toUpperCase() || (cat === 'All' && label === 'COMPREHENSIVE');
                btn.className = isSelected 
                    ? "category-btn px-6 py-2 bg-indigo-600 text-white rounded-xl text-xs font-black uppercase tracking-widest shadow-md"
                    : "category-btn px-6 py-2 bg-white border border-slate-200 text-slate-400 rounded-xl text-xs font-black uppercase tracking-widest hover:border-indigo-500 hover:text-indigo-600 transition-all";
            });
            renderProducts();
        }

        function handleNewListing(event) {
            event.preventDefault();
            const newItem = {
                id: Date.now(),
                title: document.getElementById('itemName').value,
                price: document.getElementById('itemPrice').value,
                category: document.getElementById('itemCategory').value,
                type: "Sell",
                image: document.getElementById('itemImage').value || ""
            };
            products.unshift(newItem);
            syncStorage(); // PERSIST TO DISK
            renderProducts();
            toggleModal();
            event.target.reset();
        }
    </script>
</body>
</html>
